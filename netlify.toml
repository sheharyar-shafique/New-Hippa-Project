# Netlify build configuration for MedScribe AI (Vite + React Router SPA)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Avoid CI=true breaking the Vite build with warnings-as-errors
  CI = "false"

# SPA fallback — every unknown path serves index.html so React Router
# can handle client-side routes like /app, /app/labs, /pricing, etc.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed asset bundles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers (reinforces the HIPAA posture in the UI)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
